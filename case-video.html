const PROXY = 'https://api.allorigins.win/get?url=';

/* ── Parse YouTube RSS XML ── */
function parseRSS(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  return [...doc.querySelectorAll('entry')].map(e => {
    // Extract video ID from <link> href
    const link = e.querySelector('link');
    const href = link ? link.getAttribute('href') : '';
    const id = href ? (href.split('v=')[1] || '').split('&')[0] : '';
    // Fallback: look for yt:videoId element
    let finalId = id;
    if (!finalId) {
      for (const el of e.getElementsByTagName('*')) {
        if (el.localName === 'videoId') { finalId = el.textContent.trim(); break; }
      }
    }
    const title = e.querySelector('title')?.textContent?.trim() || '';
    return { id: finalId, title };
  }).filter(v => v.id);
}

/* ── Fetch RSS via CORS proxy ── */
async function fetchRSS(url) {
  const r = await fetch(PROXY + encodeURIComponent(url), { cache: 'default' });
  if (!r.ok) throw new Error('proxy error');
  const data = await r.json();
  return parseRSS(data.contents);
}

/* ── Build skeleton cards ── */
function buildSkeletons(grid, count, isShort) {
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'skeleton ' + (isShort ? 'sc' : 'vc');
    grid.appendChild(d);
  }
}

/* ── Build video card ── */
function buildCard(video, index, isShort) {
  const card = document.createElement('div');
  card.className = isShort ? 'sc' : 'vc';
  const thumb = isShort
    ? `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`
    : `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;
  card.innerHTML = `
    <img src="${thumb}" alt="${video.title || '案例影片 ' + (index+1)}" loading="lazy">
    <div class="vcp">
      <div class="vpb">
        <svg width="${isShort?14:16}" height="${isShort?14:16}" viewBox="0 0 16 16" fill="white"><polygon points="5,3 13,8 5,13"></polygon></svg>
      </div>
    </div>
    ${video.title ? `<div class="vtitle">${video.title}</div>` : ''}
    <div class="vnum">${String(index+1).padStart(2,'0')}</div>
  `;
  card.addEventListener('click', () => openModal(video.id, isShort));
  return card;
}

/* ── Build error state ── */
function buildError(grid, msg) {
  grid.innerHTML = `<div class="fetch-err" style="grid-column:1/-1"><p>${msg}</p></div>`;
}

/* ── Load shorts ── */
async function loadShorts() {
  const grid = document.getElementById('shortsGrid');
  buildSkeletons(grid, 5, true);
  try {
    const videos = await fetchRSS(
      `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`
    );
    if (!videos.length) throw new Error('empty');
    grid.innerHTML = '';
    videos.forEach((v, i) => grid.appendChild(buildCard(v, i, true)));
  } catch (e) {
    buildError(grid, '短影音載入失敗，請<a href="https://www.youtube.com/@superiorpdrart/shorts" target="_blank" rel="noopener" style="color:var(--accent)">前往 YouTube 頻道</a>瀏覽。');
  }
}

/* ── Modal ── */
const modalBg    = document.getElementById('modalBg');
const modalFrame = document.getElementById('modalFrame');
const modalWrap  = document.getElementById('modalWrap');
const modalClose = document.getElementById('modalClose');

function openModal(id, isShort) {
  const embedUrl = isShort
    ? `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`
    : `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  const ratio = isShort ? '9/16' : '16/9';
  modalWrap.style.aspectRatio = ratio;
  modalWrap.classList.toggle('short-mode', isShort);
  modalFrame.src = embedUrl;
  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modalBg.classList.remove('open');
  setTimeout(() => { modalFrame.src = ''; }, 250);
  document.body.style.overflow = '';
}
modalClose.addEventListener('click', closeModal);
modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── Reveal observer ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
}, { threshold: 0.06 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ── Init ── */
loadShorts();
</script>
